<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome (iconos) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <title>Menú Offcanvas</title>
</head>

<body>

  <!-- BOTÓN -->
  <button class="btn btn-dark rounded-pill px-3 shadow-sm" type="button"
    data-bs-toggle="offcanvas" data-bs-target="#menuVertical"
    aria-controls="menuVertical">
    <i class="fas fa-bars me-2"></i> Menú
  </button>

  <!-- OFFCANVAS -->
  <div class="offcanvas offcanvas-start" tabindex="-1" id="menuVertical">

    <!-- CABECERA -->
    <div class="offcanvas-header border-bottom">
      <h5 class="offcanvas-title fw-bold">
        <i class="fas fa-tree me-2 text-success"></i>
        Sierra Bicuera
      </h5>

      <!-- BOTÓN CERRAR -->
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
    </div>

    <!-- CUERPO -->
    <div class="offcanvas-body d-flex flex-column">
      <!-- IMAGEN DE FONDO --> <div class="menu-bg"></div>

      <div class="list-group list-group-flush">

        <a href="index.html" class="list-group-item list-group-item-action">
          <i class="fas fa-home me-2 text-primary"></i> Inicio
        </a>

        <a href="especies.html" class="list-group-item list-group-item-action">
          <i class="fas fa-paw me-2 text-success"></i> Especies
        </a>

        <a href="reservas.html" class="list-group-item list-group-item-action">
          <i class="fas fa-calendar-check me-2 text-warning"></i> Reservas
        </a>

        <a href="galeria.html" class="list-group-item list-group-item-action">
          <i class="fas fa-image me-2 text-danger"></i> Galería
        </a>

      </div>

      <div class="mt-auto pt-4 text-center small text-muted">
        © 2026 Sierra Bicuera
      </div>

    </div>
  </div>

  <!-- Bootstrap JS (OBLIGATORIO para que funcione cerrar) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
