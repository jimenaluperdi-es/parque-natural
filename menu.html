<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome (iconos) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <title>Menú Offcanvas</title>
</head>

<body>
      <!-- MENÚ LATERAL (ESCRITORIO) -->
    <div class="menu-lateral d-none d-lg-flex flex-column p-3 text-white">
    
      <h3 class="text-white">
        <i class="fa-solid fa-tree"></i> Sierra Bicuera</h3>
       
      <a href="index.html" class="btn btn-outline-light mb-2 text-start text-white">
        <i class="fa-solid fa-house me-2"></i> Inicio
      </a>
    
      <a href="especies.html" class="btn btn-outline-light mb-2 text-start text-white">
        <i class="fa-solid fa-paw me-2"></i> Especies
      </a>
    
      <a href="reservas.html" class="btn btn-outline-light mb-2 text-start text-white">
        <i class="fa-solid fa-calendar-check me-2"></i> Reservas
      </a>
    
      <a href="galeria.html" class="btn btn-outline-light mb-2 text-start text-white">
        <i class="fa-solid fa-image me-2"></i> Galería
      </a>
    
    </div>
    
    <!-- BOTÓN HAMBURGUESA -->
    <button class="btn btn-dark btn-hamburguesa d-lg-none" type="button" data-bs-toggle="offcanvas"
      data-bs-target="#menuVertical">
      <i class="fa-solid fa-bars"></i>
      menu
    </button>
    
    <!-- OFFCANVAS (MÓVIL MODERNO) -->
    <div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="menuVertical">
    
      <div class="offcanvas-header border-bottom border-secondary">
        <h4 class="fw-bold m-0">
          <i class="fa-solid fa-tree me-2 text-success"></i>
          Sierra Bicuera
        </h4>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
      </div>
    
      <div class="offcanvas-body d-flex flex-column p-0 position-relative overflow-hidden">
    
        <!-- 🌄 FONDO DE IMAGEN CORRECTO -->
        <div class="menu-bg"></div>
    
        <!-- MENÚ -->
        <div class="list-group list-group-flush position-relative z-2">
    
          <a href="index.html" class="list-group-item list-group-item-action bg-transparent text-dark">
            <i class="fa-solid fa-house me-2"></i> Inicio
          </a>
    
          <a href="especies.html" class="list-group-item list-group-item-action bg-transparent text-dark">
            <i class="fa-solid fa-paw me-2"></i> Especies
          </a>
    
          <a href="reservas.html" class="list-group-item list-group-item-action bg-transparent text-dark">
            <i class="fa-solid fa-calendar-check me-2"></i> Reservas
          </a>
    
          <a href="galeria.html" class="list-group-item list-group-item-action bg-transparent text-dark">
            <i class="fa-solid fa-image me-2"></i> Galería
          </a>
    
        </div>
    
        <!-- FOOTER DENTRO DEL MENÚ -->
        <div class="mt-auto text-center small text-muted p-3 position-relative z-2 text-bg-info">
          © 2026 Sierra Bicuera
        </div>
      </div>
    </div>    
  <!-- Bootstrap JS (OBLIGATORIO para que funcione cerrar) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
