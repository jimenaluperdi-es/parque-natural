<header class="container-fluid p-0 position-relative text-center overflow-hidden" style="height: 320px;">

  <!-- Overlay más elegante -->

    style="background: linear-gradient(to bottom, rgba(0,0,0,0.35), rgba(0,0,0,0.75));">

  <!-- Texto -->
